<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Page not found - LoguardLLM</title>
    <style>
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #f5f5f5;
            color: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .wrapper {
            background: #ffffff;
            padding: 2rem 2.5rem;
            border-radius: 8px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
            max-width: 480px;
            text-align: center;
        }
        h1 {
            font-size: 1.75rem;
            margin-bottom: 0.5rem;
        }
        p {
            margin: 0.25rem 0;
        }
        .code {
            font-weight: 600;
            color: #dc3545;
            margin-bottom: 0.5rem;
        }
        a.button {
            display: inline-block;
            margin-top: 1.5rem;
            padding: 0.5rem 1.25rem;
            border-radius: 4px;
            background: #667eea;
            color: #fff;
            text-decoration: none;
            font-weight: 500;
        }
        a.button:hover {
            background: #5568d3;
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="code">404 – Page not found</div>
        <h1>This page does not exist.</h1>
        <p>The URL you requested could not be found.</p>
        <p>This prototype focuses on Django admin and log analysis.</p>
        <a href="/admin/" class="button">Go to Django admin</a>
    </div>
</body>
</html>
